services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: bank
      POSTGRES_USER: bank
      POSTGRES_PASSWORD: bank
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bank -d bank"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7.2.3
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru

  backend:
    build: ./backend
    environment:
      DB_HOST: postgres
      DB_NAME: bank
      DB_USER: bank
      DB_PASSWORD: bank
      REDIS_HOST: redis
      SCORING_DELAY_SEC: "1.5"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: on-failure

  k6:
    image: grafana/k6:latest
    volumes:
      - ./k6:/scripts
    environment:
      BASE_URL: http://backend:8000
    profiles:
      - benchmark

volumes:
  pgdata:
